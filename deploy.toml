[package]
name             = "wspr-recorder"
version          = "0.1.0"
contract_version = "0.8"
license          = "MIT"

# Configuration interview (CONTRACT-v0.5 §14).  Sigmond invokes
# wspr-recorder's own argparse subcommands.  Only [radiod].status_address
# is written here; reporter callsign/grid live in wsprdaemon-client (or
# coordination.toml [host]) since wspr-recorder's schema has no
# [station] block.
[contract.config]
init = ["/usr/local/bin/wspr-recorder", "config", "init"]
edit = ["/usr/local/bin/wspr-recorder", "config", "edit"]

# Greenfield per-instance env defaults sigmond seeds into
# /etc/wspr-recorder/env/<reporter_id>.env when it creates an instance.
# A sigmond-managed host has NO legacy `wd-decode@*` bash chain, so the
# recorder must decode in-process -> SQLite sink; without this it captures
# WAVs but never decodes (no spots). Off-by-default in the client itself so
# legacy wsprdaemon hosts (with the bash chain) don't double-decode.
[contract.instance_env]
WD_DECODE_VIA_DB = "1"
# Reporter call for wsprnet / wsprdaemon uploads, derived per-instance by
# sigmond from the reporter id: {reporter_call} expands to the display form
# (AC0G=S -> AC0G/S) so the path-safe internal '=' never reaches wsprnet
# (the upload path sends the receiver call verbatim).
WD_RECEIVER_CALL = "{reporter_call}"

[build]
steps = [
    "python3 -m venv /opt/git/sigmond/wspr-recorder/venv",
    "/opt/git/sigmond/wspr-recorder/venv/bin/pip install --upgrade pip setuptools wheel",
    "/opt/git/sigmond/wspr-recorder/venv/bin/pip install -e /opt/git/sigmond/wspr-recorder",
]
produces = [
    "/opt/git/sigmond/wspr-recorder/venv/bin/wspr-recorder",
]

[[install.steps]]
kind = "link"
src  = "/opt/git/sigmond/wspr-recorder/venv/bin/wspr-recorder"
dst  = "/usr/local/bin/wspr-recorder"

[[install.steps]]
kind = "link"
src  = "/opt/git/sigmond/wspr-recorder/venv/bin/wspr-ctl"
dst  = "/usr/local/bin/wspr-ctl"

[[install.steps]]
kind = "link"
src  = "systemd/wspr-recorder@.service"
dst  = "/etc/systemd/system/wspr-recorder@.service"

[[install.steps]]
kind = "link"
src  = "systemd/wspr-uploader.service"
dst  = "/etc/systemd/system/wspr-uploader.service"

[[install.steps]]
kind      = "render"
src       = "config.toml.example"
dst       = "/etc/wspr-recorder/config.toml"
if_absent = true

[[install.steps]]
kind  = "mkdir"
dst   = "/var/log/wspr-recorder"
owner = "wsprrec:wsprrec"
mode  = "0755"

[[install.steps]]
kind  = "mkdir"
dst   = "/dev/shm/wspr-recorder"
owner = "wsprrec:wsprrec"
mode  = "0755"

# hs-uploader's watermark store — the unit declares it in ReadWritePaths=, so
# it must exist before start or systemd fails namespacing (226/NAMESPACE).
# Shared across uploader clients (wspr-recorder, mag-recorder), hence the
# sigmond group + setgid rather than a single service user.
[[install.steps]]
kind  = "mkdir"
dst   = "/var/lib/hs-uploader"
owner = "root:sigmond"
mode  = "2775"

[systemd]
# Per-instance decoders (one per radiod), expanded from configured instances.
templated_units = ["wspr-recorder@.service"]
# Host-local singleton: the fleet merge-uploader runs on ONE host (the merge
# host); smd only manages it where it's actually enabled (see
# lifecycle._resolve_optional_units), so decode-only hosts don't false-alarm.
optional_units = ["wspr-uploader.service"]

[deps]
[[deps.pypi]]
name    = "ka9q-python"
version = "3.8.0"
venv    = "/opt/git/sigmond/wspr-recorder/venv"

[[deps.pypi]]
name    = "numpy"
version = "1.20.0"
venv    = "/opt/git/sigmond/wspr-recorder/venv"

[[deps.apt]]
name = "wsjtx"
note = "provides jt9 for FST4W decoding"

[[deps.apt]]
name = "whiptail"
optional = true
note = "drives scripts/config-wizard.sh; configurator falls back to stdin prompts if absent"

# ---------------------------------------------------------------------------
# Sigmond UI hooks (drop-in registration for `smd watch` + TUI Activity).
# Consumed by lib/sigmond/client_features.py.
# ---------------------------------------------------------------------------

[client_features.watch]
verb         = "wspr"
description  = "WSPRnet upload events (per-batch start/done)"
verbose      = true
per_instance = true

[client_features.verifier]
verb         = "wspr"
description  = "WSPRnet upload audit (lost / in-flight / delivered / cadence)"
kind         = "spot_queue"
per_instance = true

[client_features.receiver_channels]
description  = "WSPR/FST4W sub-band channels"
per_instance = true
parser_file  = "wspr_recorder/sigmond_tui.py"
parser_attr  = "parse_receiver_channels"
